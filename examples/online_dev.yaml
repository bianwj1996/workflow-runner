name: "在线代码开发"
version: "1.0"

context:
  work_dir: "./project"
  model: "claude-sonnet-4-6"

steps:

  # ── 需求分析 ──
  - id: requirement_analysis
    type: llm
    description: "需求分析，产出规格文档"
    skill_dir: "./examples/skills/requirement_analysis"
    user_prompt: |
      请分析以下需求，产出规格文档：
      {{ input.task }}
    output:
      save_to: "{{ config.work_dir }}/specs/analysis.md"

  # ── 人机确认 ──
  - id: human_review
    type: approval
    description: "确认需求分析结果"
    depends_on: [requirement_analysis]
    message: |
      请检查需求分析结果。

      文件: {{ config.work_dir }}/specs/analysis.md
    show_file: "{{ config.work_dir }}/specs/analysis.md"
    choices:
      - label: "通过，开始开发"
      - label: "驳回，重新分析"
        next: requirement_analysis

  # ── 代码开发 ──
  - id: code_development
    type: llm
    description: "按规格实现代码"
    depends_on: [human_review]
    agent:
      permission_mode: "acceptEdits"      # 允许直接写文件
      allowed_tools: [Read, Write, Edit, Bash, Glob, Grep]
    skill_dir: "./examples/skills/code_development"
    user_prompt: |
      根据以下规格实现代码：

      {{ steps.requirement_analysis.output }}
    output:
      save_to: "{{ config.work_dir }}/src/"

  # ════════════════════════════════════════════════════════════
  #  编译─修复 循环 (Python-level loop)
  #  compile → 失败 → analyze → compile → 失败 → analyze → ...
  #  直到编译通过，才进入冒烟测试
  # ════════════════════════════════════════════════════════════

  - id: compile_check
    type: script
    description: "编译验证"
    depends_on: [code_development]
    command: "cd {{ config.work_dir }} && npm run build 2>&1"
    on_failure:
      action: goto
      target: compile_failure_analysis    # ← 回退到分析节点

  - id: compile_failure_analysis
    type: llm
    description: "分析编译失败原因并修复代码"
    skill_dir: "./examples/skills/failure_analysis"
    user_prompt: |
      编译失败，错误信息：

      {{ steps.compile_check.stderr }}

      请分析原因并给出修复后的代码。
    output:
      save_to: "{{ config.work_dir }}/specs/fix_plan.md"
    # 没有 depends_on —— 只通过 on_failure: goto 到达
    # 执行完毕后 compile_check 自动变为 ready（依赖的 code_development 已满足）

  # ── 冒烟测试 ──
  - id: smoke_test
    type: script
    description: "冒烟测试"
    depends_on: [compile_check]            # ← 编译通过后才执行
    command: "./examples/scripts/smoke_test.sh {{ config.work_dir }}"

  # ── 上线部署 ──
  - id: deploy
    type: script
    description: "上线部署"
    depends_on: [smoke_test]
    command: "./examples/scripts/deploy.sh {{ config.work_dir }}"

  # ── 代码审查 (独立 agent，只读) ──
  - id: code_review
    type: llm
    description: "AI 代码审查 — 独立 agent session，只读权限"
    depends_on: [deploy]
    agent:
      model: "claude-sonnet-4-6"         # 可以用和开发不同的模型
      permission_mode: "plan"             # 只读模式，不允许修改代码
      allowed_tools: [Read, Grep, Glob]   # 只能读，不能写/执行
      max_turns: 15
    skill_dir: "./examples/skills/code_review"
    user_prompt: |
      审查以下改动。需求规格：

      {{ steps.requirement_analysis.output }}

      请产出 CR 报告，列出问题和建议。
    output:
      save_to: "{{ config.work_dir }}/specs/cr_report.md"

  # ════════════════════════════════════════════════════════════
  #  CR 驳回 → 重新开发 循环 (Python-level loop)
  #  CR 不通过 → 回到代码开发 → 编译 → 冒烟 → 部署 → 再 CR
  # ════════════════════════════════════════════════════════════

  - id: cr_approval
    type: approval
    description: "确认 CR 结果"
    depends_on: [code_review]
    message: |
      CR 完成。报告: {{ config.work_dir }}/specs/cr_report.md
    show_file: "{{ config.work_dir }}/specs/cr_report.md"
    choices:
      - label: "通过，归档"
      - label: "驳回，重新开发"
        next: code_development               # ← 回退到开发节点，触发完整重跑
