name: "离线 Jupyter 数据分析"
version: "1.0"

context:
  work_dir: "./notebooks"
  model: "claude-sonnet-4-6"

steps:

  - id: start_jupyter
    type: script
    description: "确认 Jupyter 可连接"
    command: "curl -s http://localhost:8888/api/kernels | python3 -c 'import sys,json; print(len(json.load(sys.stdin)), \"kernel(s) running\")'"

  - id: data_analysis
    type: llm
    description: "通过 Jupyter MCP 分析数据"
    depends_on: [start_jupyter]
    agent:
      session: shared
      mcp_servers:
        jupyter:
          command: "uvx"
          args: ["jupyter-mcp-server@latest"]
          env:
            JUPYTER_URL: "http://localhost:8888"
            JUPYTER_TOKEN: "{{ env.JUPYTER_TOKEN }}"
            ALLOW_IMG_OUTPUT: "true"
      allowed_tools:
        - Read
        - Write
        - Edit
        - Bash
        - Glob
        - Grep
        - mcp__jupyter__execute_code
        - mcp__jupyter__execute_cell
        - mcp__jupyter__read_cell
        - mcp__jupyter__list_kernels
        - mcp__jupyter__use_notebook
    skill_dir: "jupyter_analyst"
    user_prompt: |
      使用 Jupyter 分析以下任务。用 execute_code 工具在 kernel 中运行代码。

      {{ input.task }}

      完成分析后，产出报告。
    output:
      save_to: "{{ config.work_dir }}/analysis_result.md"

  - id: export_results
    type: script
    description: "导出结果"
    depends_on: [data_analysis]
    command: "python3 -c 'print(\"Results exported.\")'"
